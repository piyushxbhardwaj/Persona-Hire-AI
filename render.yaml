services:
  - type: web
    name: persona-hire-ai-backend
    env: python
    plan: free # Can be upgraded to starter to avoid spin-down latency
    buildCommand: pip install -r requirements.txt && python backend/ingest.py
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: 10000
      - key: OPENAI_API_KEY
        sync: false
      - key: GITHUB_TOKEN
        sync: false
      - key: GOOGLE_CALENDAR_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_CALENDAR_ID
        value: primary
      - key: VAPI_SECRET
        sync: false
